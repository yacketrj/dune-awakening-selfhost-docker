repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: end-of-file-fixer
      - id: trailing-whitespace

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.28.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: ggshield
        name: ggshield
        entry: ggshield secret scan pre-commit
        language: system
        pass_filenames: false
        always_run: true
        verbose: false

      - id: trivy
        name: trivy
        entry: trivy fs --scanners secret --severity HIGH,CRITICAL --ignorefile .trivyignore .
        language: system
        pass_filenames: false
        always_run: true
        verbose: false

      - id: semgrep
        name: semgrep
        entry: semgrep --error --config p/default --exclude console/api/test/operationsPermissionMatrix.test.js
        language: system
        pass_filenames: false
        always_run: true
        verbose: false

      - id: security-pr-checks
        name: Security checks
        entry: bash tests/security-pr-checks.sh
        language: system
        pass_filenames: false
        files: ^(console|runtime|docker-compose|\.env)
