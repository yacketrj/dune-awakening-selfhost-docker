name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "integration/**"
      - "release/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: console/api/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: console/api
      - name: Run console API tests
        run: node --test test/*.test.js
        working-directory: console/api

  metrics-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Run metrics stack unit tests
        run: bash tests/metrics-stack-unit.sh

  security-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
        with:
          fetch-depth: 0
      - name: Add upstream remote
        run: git remote add upstream https://github.com/Red-Blink/dune-awakening-selfhost-docker.git
      - name: Fetch upstream
        run: git fetch upstream main
      - name: Run security PR checks
        run: bash tests/security-pr-checks.sh
      - name: Validate CHANGELOG
        run: bash scripts/validate-changelog.sh
      - name: Check SBOM freshness
        run: bash scripts/check-sbom-fresh.sh

  api-dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: console/api/package-lock.json
      - name: npm audit
        run: npm audit --audit-level=high
        working-directory: console/api

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: console/api/package-lock.json
      - name: Install dependencies
        run: npm ci
        working-directory: console/api
      - name: Run coverage
        run: npm run coverage:check
        working-directory: console/api

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a
        with:
          node-version: "22"
      - name: Generate SBOM
        run: node scripts/generate-sbom.js
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: sbom
          path: |
            dist/*.cdx.json
            dist/*.cdx.json.sha256
          if-no-files-found: error

  image-build:
    if: ${{ !startsWith(github.ref, 'refs/heads/feature/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - name: Build console image
        run: docker build -t dune-console:ci -f console/api/Dockerfile .
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@2d50410d417fdb11d4e7b2dee1e5d618ea50b2c9
        with:
          image-ref: dune-console:ci
          format: table
          exit-code: "0"
          severity: HIGH,CRITICAL
