name: Dune Sustained WAN Probe

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Test TCP and repeatedly send UDP
        shell: python
        run: |
          import socket
          import time
          import urllib.request

          host = "50.123.64.61"
          tcp_port = 31982
          udp_ports = [7777, 7778, 7779]

          runner_ip = urllib.request.urlopen(
              "https://api.ipify.org",
              timeout=10,
          ).read().decode().strip()

          print(f"RUNNER_IP={runner_ip}", flush=True)

          for attempt in range(1, 11):
              sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
              sock.settimeout(5)

              try:
                  started = time.monotonic()
                  sock.connect((host, tcp_port))
                  elapsed = time.monotonic() - started
                  print(
                      f"TCP_SUCCESS attempt={attempt} "
                      f"elapsed={elapsed:.3f}",
                      flush=True,
                  )
              except Exception as exc:
                  print(
                      f"TCP_FAILURE attempt={attempt} error={exc}",
                      flush=True,
                  )
              finally:
                  sock.close()

              time.sleep(1)

          print("Starting 60-second UDP transmission", flush=True)

          for sequence in range(1, 61):
              for port in udp_ports:
                  sock = socket.socket(
                      socket.AF_INET,
                      socket.SOCK_DGRAM,
                  )

                  payload = (
                      f"DUNE_GITHUB_PROBE "
                      f"runner={runner_ip} "
                      f"sequence={sequence} "
                      f"port={port}"
                  ).encode()

                  try:
                      sock.sendto(payload, (host, port))
                  finally:
                      sock.close()

              print(
                  f"UDP_SEQUENCE_SENT={sequence}",
                  flush=True,
              )
              time.sleep(1)

          print("Probe complete", flush=True)
